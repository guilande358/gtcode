name: Build Desktop (Electron)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    - name: Build web app
      run: npm run build

    - name: Sync Capacitor Electron
      run: npx cap sync @capacitor-community/electron

    - name: Build Electron app
      run: npx cap build @capacitor-community/electron --prod

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: gcodeforce-desktop-${{ matrix.os }}
        path: electron/dist/**/*
