name: Build Electron Desktop Apps (Production)

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite rodar manualmente

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build web app (production)
        run: npm run build  # ou npm run build -- --mode production se for Vite

      - name: Capacitor Sync Electron
        run: npx cap sync @capacitor-community/electron

      - name: Build Electron app (usando script interno)
        run: |
          cd electron
          npm install --production  # instala só deps de prod no Electron
          npm run build            # ou o script de build que o plugin gerou (ver package.json do electron)
          # Se o plugin tiver electron-builder, pode ser:
          # npx electron-builder --mac --config electron-builder.json

      - name: Upload macOS artifact (.app ou .dmg)
        uses: actions/upload-artifact@v4
        with:
          name: gcodeforce-electron-macos
          path: electron/dist/**/*
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build web app (production)
        run: npm run build

      - name: Capacitor Sync Electron
        run: npx cap sync @capacitor-community/electron

      - name: Build Electron app (usando script interno)
        run: |
          cd electron
          npm install --production
          npm run build  # ou npx electron-builder --win

      - name: Upload Windows artifact (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: gcodeforce-electron-windows
          path: electron/dist/**/*
          retention-days: 7
