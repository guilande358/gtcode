name: Build Electron

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Sync Electron
        run: npx cap sync electron

      - name: Build Electron app
        run: |
          cd electron
          npm install
          npx electron-builder build --${{ runner.os == 'macOS' && 'mac' || 'win' }} --publish never

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ runner.os }}
          path: electron/dist/**/*
